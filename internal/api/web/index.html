<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Heimdall</title>

    <link
            rel="stylesheet"
            href="/css/main.css"
    >

    <script
            type="module"
            src="/js/app.js"
            defer
    ></script>
</head>

<body>

<header>
    <div class="header-row">

        <div class="wordmark">
            <h1>HEIMDALL</h1>
            <span class="subtitle">
                watching truenas
            </span>
        </div>

        <div class="status">
            <span
                    class="status-dot info"
                    id="status-dot"
            ></span>

            <span id="status-text">
                nominal
            </span>
        </div>

    </div>

    <nav>
        <button
                class="tab active"
                data-view="watch">
            WATCH
        </button>

        <button
                class="tab"
                data-view="sources">
            SOURCES
        </button>

        <button
                class="tab"
                data-view="rules">
            RULES
        </button>
    </nav>
</header>

<div
        class="bifrost"
        id="bifrost"
></div>

<main>

    <div
            class="view active"
            id="view-watch">

        <div class="toolbar">
            <div class="filters">

                <button
                        class="filter-btn active"
                        data-severity="all">
                    ALL
                </button>

                <button
                        class="filter-btn"
                        data-severity="warning">
                    WARNING
                </button>

                <button
                        class="filter-btn"
                        data-severity="critical">
                    CRITICAL
                </button>

            </div>
        </div>

        <div
                class="event-list"
                id="event-list">
        </div>

    </div>

    <div
            class="view"
            id="view-sources">

        <div
                class="source-list"
                id="source-list">
        </div>

        <form
                class="add-form"
                id="source-form">

            <select id="source-type"></select>

            <input
                    id="source-path"
                    placeholder="/var/log/example.log"
                    required
            >

            <button>
                ADD SOURCE
            </button>

        </form>

        <div
                class="form-error"
                id="source-error">
        </div>

    </div>

    <div
            class="view"
            id="view-rules">

        <div
                class="source-list"
                id="rule-list">
        </div>

        <form
                class="add-form"
                id="rule-form">

            <select id="rule-source-type"></select>

            <input
                    id="rule-pattern"
                    placeholder="regex pattern"
                    required
            >

            <select id="rule-severity">
                <option value="info">info</option>
                <option value="warning">warning</option>
                <option value="critical">critical</option>
            </select>

            <input
                    id="rule-event-type"
                    placeholder="event type"
                    required
            >

            <button>
                ADD RULE
            </button>

        </form>

        <div
                class="form-error"
                id="rule-error">
        </div>

    </div>

</main>

</body>
</html>
